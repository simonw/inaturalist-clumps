name: Update clumps.json

on:
  push:
    branches: [main]
  schedule:
    - cron: "9 */3 * * *"
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Run with --full-refresh"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install inaturalist-clumper
        run: pip install https://github.com/simonw/inaturalist-clumper/archive/refs/heads/main.zip

      - name: Run inaturalist-clumper
        run: |
          inaturalist-clumper simonw simon583 --output clumps.json${{ inputs.full_refresh == true && ' --full-refresh' || '' }}

      - name: Strip generated_at from clumps.json
        run: |
          jq 'del(.generated_at)' clumps.json > clumps.json.tmp && mv clumps.json.tmp clumps.json

      - name: Commit clumps.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clumps.json
          if git diff --staged --quiet; then
            echo "No changes to clumps.json"
          else
            git commit -m "Update clumps.json"
            git push
          fi
